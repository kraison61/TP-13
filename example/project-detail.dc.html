<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'Sarabun', system-ui, sans-serif;
      --color-navy: #0a3d62;
      --color-bg: #f0f4f8;
    }
    .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:220px; gap:12px; }
    .item-hero  { grid-column:span 2; grid-row:span 2; }
    .item-wide  { grid-column:span 2; }
    .item-tall  { grid-row:span 2; }
    @media(max-width:900px)  { .photo-grid { grid-template-columns:repeat(2,1fr); grid-auto-rows:180px; } .item-hero,.item-tall { grid-row:span 1; } }
    @media(max-width:560px)  { .photo-grid { grid-template-columns:1fr; grid-auto-rows:220px; } .item-hero,.item-wide,.item-tall { grid-column:span 1; grid-row:span 1; } }
    .photo-item:hover img     { transform:scale(1.06); }
    .photo-item img           { transition:transform .55s cubic-bezier(.25,.46,.45,.94); }
    .photo-item:hover .ph-cap { opacity:1; }
    .lb-thumb.lb-active       { opacity:1; outline:2px solid #fff; outline-offset:2px; }
    @keyframes lbIn { from{opacity:0} to{opacity:1} }
    .lightbox { animation:lbIn .18s ease; }
  </style>
  <div class="hidden item-hero item-wide item-tall lb-active"></div>
</helmet>

<div class="min-h-screen bg-bg font-sans text-slate-800 antialiased">

  <!-- BREADCRUMB -->
  <nav class="bg-navy h-13 flex items-center px-7" aria-label="breadcrumb">
    <div class="max-w-6xl w-full mx-auto flex items-center gap-2.5">
      <a href="/projects" class="flex items-center gap-1.5 text-white/60 text-sm font-medium hover:text-white transition-colors">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        คลังผลงาน
      </a>
      <span class="text-white/25 text-sm">/</span>
      <span class="text-white/85 text-sm font-medium">{{ proj.title }}</span>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="bg-navy relative overflow-hidden pt-10 pb-14">
    <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse 60% 140% at 95% 10%,rgba(30,96,145,.5),transparent 60%)"></div>
    <div class="absolute bottom-0 left-0 right-0 h-11" style="background:linear-gradient(to bottom right,transparent 49.5%,#f0f4f8 50%)"></div>
    <div class="max-w-6xl mx-auto px-7 relative flex flex-wrap gap-8 items-end justify-between">
      <div>
        <div class="flex items-center gap-2.5 mb-4 flex-wrap">
          <span class="bg-white/13 backdrop-blur border border-white/18 text-white text-[11px] font-bold px-3 py-1 rounded tracking-widest uppercase">{{ proj.category }}</span>
          <span class="flex items-center gap-1.5 text-white/55 text-sm">
            <svg width="10" height="13" viewBox="0 0 10 13" fill="none"><path d="M5 0C2.79 0 1 1.79 1 4c0 3 4 9 4 9s4-6 4-9c0-2.21-1.79-4-4-4zm0 5.5A1.5 1.5 0 1 1 5 2.5a1.5 1.5 0 0 1 0 3z" fill="currentColor"/></svg>
            {{ proj.province }}
          </span>
        </div>
        <h1 class="text-white font-bold text-4xl tracking-tight leading-tight mb-3 max-w-2xl" style="text-wrap:pretty">{{ proj.title }}</h1>
        <p class="text-white/60 text-base font-light leading-relaxed max-w-lg">{{ proj.description }}</p>
      </div>
      <div class="flex items-center gap-2 text-white/50 text-sm shrink-0">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="2" y="9" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="9" width="5" height="5" rx="1" fill="currentColor"/></svg>
        {{ total }} ภาพ
      </div>
    </div>
  </header>

  <!-- STATS -->
  <div class="max-w-6xl mx-auto px-7">
    <div class="bg-white rounded-2xl -mt-4 px-7 py-5 shadow-md relative z-10 grid gap-5" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">
      <sc-for list="{{ proj.stats }}" as="s" hint-placeholder-count="6">
        <div class="flex flex-col gap-1">
          <span class="text-[11px] text-slate-400 uppercase tracking-widest font-semibold">{{ s.label }}</span>
          <span class="text-[17px] font-bold text-navy">{{ s.value }}</span>
        </div>
      </sc-for>
    </div>
  </div>

  <!-- GALLERY GRID -->
  <main class="max-w-6xl mx-auto px-7 pt-8 pb-20">
    <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
      <h2 class="text-lg font-bold text-navy">ภาพโครงการทั้งหมด</h2>
      <span class="text-sm text-slate-400">คลิกที่ภาพเพื่อขยาย</span>
    </div>
    <div class="photo-grid">
      <sc-for list="{{ photos }}" as="ph" hint-placeholder-count="9">
        <div class="{{ ph.span }} photo-item overflow-hidden rounded-xl cursor-zoom-in relative bg-slate-200" onClick="{{ ph.open }}" role="button" tabindex="0" aria-label="{{ ph.caption }}">
          <img src="{{ ph.src }}" alt="{{ ph.caption }}" loading="lazy" width="800" height="600" class="w-full h-full object-cover block" />
          <div class="ph-cap absolute inset-0 opacity-0 transition-opacity duration-200 flex items-end p-4" style="background:linear-gradient(to top,rgba(6,44,74,.88),transparent 55%)">
            <p class="text-white text-sm font-medium leading-snug">{{ ph.caption }}</p>
          </div>
          <span class="absolute top-2.5 right-2.5 bg-black/35 backdrop-blur text-white text-[11px] font-semibold px-2 py-0.5 rounded-full opacity-0 group-hover:opacity-100">{{ ph.num }}</span>
        </div>
      </sc-for>
    </div>
  </main>
</div>

<!-- LIGHTBOX -->
<sc-if value="{{ lbOpen }}" hint-placeholder-val="{{ false }}">
  <div class="lightbox fixed inset-0 z-50 bg-[rgba(5,15,30,.96)] flex flex-col items-center justify-center" role="dialog" aria-modal="true">
    <!-- close -->
    <button class="fixed top-4 right-4 w-10 h-10 rounded-full flex items-center justify-center bg-white/8 border border-white/14 text-white hover:bg-white/20 transition-colors z-10" onClick="{{ close }}" aria-label="ปิด">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <!-- prev / next -->
    <button class="fixed left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full flex items-center justify-center bg-white/8 border border-white/12 text-white hover:bg-white/18 transition-colors" onClick="{{ prev }}" aria-label="ก่อนหน้า">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 3L5 9l6 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="fixed right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full flex items-center justify-center bg-white/8 border border-white/12 text-white hover:bg-white/18 transition-colors" onClick="{{ next }}" aria-label="ถัดไป">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 3l6 6-6 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- main image -->
    <div class="flex-1 w-full flex items-center justify-center overflow-hidden px-20 pt-14 pb-5">
      <img src="{{ active.src }}" alt="{{ active.caption }}" class="max-w-full max-h-full object-contain rounded shadow-2xl block" />
    </div>
    <!-- caption + counter -->
    <p class="text-white/60 text-sm text-center px-5 pb-1 font-light min-h-5">{{ active.caption }}</p>
    <p class="text-white/35 text-xs text-center pb-3">{{ lbIdx }} / {{ total }}</p>
    <!-- strip -->
    <div class="flex gap-2 px-5 pb-5 overflow-x-auto [scrollbar-width:thin] w-full justify-center">
      <sc-for list="{{ thumbs }}" as="th" hint-placeholder-count="9">
        <div class="{{ th.cls }} lb-thumb w-15 h-11 rounded overflow-hidden cursor-pointer opacity-45 hover:opacity-80 transition-opacity shrink-0" onClick="{{ th.go }}">
          <img src="{{ th.src }}" alt="{{ th.caption }}" class="w-full h-full object-cover block" loading="lazy" />
        </div>
      </sc-for>
    </div>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:960}}">
class Component extends DCLogic {
  state = { lbOpen: false, idx: 0 };

  proj = {
    title: 'อาคารสำนักงาน One Bangkok Tower',
    category: 'อาคารพาณิชย์',
    province: 'กรุงเทพมหานคร',
    description: 'อาคารสำนักงานระดับ Grade A สูง 32 ชั้น กลางย่านธุรกิจพระราม 4 ออกแบบภายใต้มาตรฐาน LEED Gold พร้อมระบบอัจฉริยะประหยัดพลังงาน',
    stats: [
      { label:'พื้นที่ใช้สอย', value:'45,000 ม²' },
      { label:'ความสูง',       value:'32 ชั้น'   },
      { label:'มูลค่าโครงการ', value:'2.8 พันล้าน' },
      { label:'ระยะเวลา',     value:'36 เดือน'  },
      { label:'มาตรฐาน',      value:'LEED Gold' },
      { label:'สถานะ',        value:'แล้วเสร็จ' },
    ],
  };

  raw = [
    { src:'https://picsum.photos/seed/ob-ext1/1200/900',  caption:'ฟาซาดกระจก Double Skin ด้านหน้าอาคาร',   span:'item-hero' },
    { src:'https://picsum.photos/seed/ob-lobby/1200/900', caption:'ล็อบบี้ชั้น 1 — หินอ่อน Calacatta',      span:'item-tall' },
    { src:'https://picsum.photos/seed/ob-roof/800/600',   caption:'Green Roof ชั้น 32',                     span:''          },
    { src:'https://picsum.photos/seed/ob-office/800/600', caption:'พื้นที่สำนักงาน Open Plan ชั้น 18',      span:''          },
    { src:'https://picsum.photos/seed/ob-conf/800/600',   caption:'Boardroom ชั้น 30',                      span:''          },
    { src:'https://picsum.photos/seed/ob-park/1200/900',  caption:'ที่จอดรถใต้ดิน 4 ชั้น 800 คัน',         span:'item-wide' },
    { src:'https://picsum.photos/seed/ob-mech/800/600',   caption:'ระบบ BMS Building Management System',   span:''          },
    { src:'https://picsum.photos/seed/ob-night/1200/900', caption:'มุมมองกลางคืน LED Facade',              span:'item-wide' },
    { src:'https://picsum.photos/seed/ob-sky/800/600',    caption:'Sky Garden ชั้น 25',                     span:''          },
  ];

  open  = (i) => this.setState({ lbOpen: true, idx: i });
  close = () => this.setState({ lbOpen: false });
  prev  = () => this.setState(s => ({ idx: (s.idx - 1 + this.raw.length) % this.raw.length }));
  next  = () => this.setState(s => ({ idx: (s.idx + 1) % this.raw.length }));

  componentDidMount() { document.addEventListener('keydown', this._key); }
  componentWillUnmount() { document.removeEventListener('keydown', this._key); }
  _key = e => {
    if (!this.state.lbOpen) return;
    if (e.key === 'ArrowLeft')  this.prev();
    if (e.key === 'ArrowRight') this.next();
    if (e.key === 'Escape')     this.close();
  };

  renderVals() {
    const { lbOpen, idx } = this.state;
    return {
      proj:   this.proj,
      total:  this.raw.length,
      photos: this.raw.map((p, i) => ({ ...p, num: `${i+1} / ${this.raw.length}`, open: () => this.open(i) })),
      lbOpen,
      lbIdx:  idx + 1,
      active: this.raw[idx],
      close:  this.close,
      prev:   this.prev,
      next:   this.next,
      thumbs: this.raw.map((p, i) => ({ src: p.src, caption: p.caption, cls: i === idx ? 'lb-active' : '', go: () => this.setState({ idx: i }) })),
    };
  }
}
</script>
</body>
</html>
